<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="google-site-verification"
    content="kUAprVCY8oTKV87CdWIPHE3-_4pBoOX5Z_O4ExaQb2c" />

    <title>Mateusz Kopaczewski - Wyniki</title>

    <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap"
    rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:
            radial-gradient(circle at top,#1e3a8a 0%,#0f172a 40%);
            color:white;
            font-family:'Inter',sans-serif;
            padding:40px;
            min-height:100vh;
        }

        .container{
            max-width:1200px;
            margin:auto;
        }

        .menu-box{
            position:fixed;
            top:1px;
            right:1px;
            z-index:9999;
        }

        .menu-button{
            background:rgba(30,41,59,0.95);
            border:none;
            color:white;
            width:55px;
            height:55px;
            border-radius:16px;
            cursor:pointer;
            backdrop-filter:blur(10px);
            box-shadow:0 10px 30px rgba(0,0,0,0.45);
            transition:0.25s;

            display:flex;
            align-items:center;
            justify-content:center;
        }

        .menu-button:hover{
            background:#334155;
            transform:scale(1.03);
        }

        .dropdown{
            position:absolute;
            top:65px;
            right:0;

            background:rgba(30,41,59,0.98);
            border-radius:22px;
            overflow:hidden;
            width:240px;

            backdrop-filter:blur(15px);
            box-shadow:0 10px 40px rgba(0,0,0,0.45);

            opacity:0;
            visibility:hidden;
            transform:translateY(-10px);

            transition:
            opacity 0.25s ease,
            transform 0.25s ease,
            visibility 0.25s;
        }

        .menu-box:hover .dropdown{

            opacity:1;
            visibility:visible;
            transform:translateY(0);

        }

        .dropdown a{
            display:block;
            padding:18px 22px;
            color:white;
            text-decoration:none;
            transition:0.2s;
            border-bottom:1px solid rgba(255,255,255,0.05);
            font-weight:600;
        }

        .dropdown a:hover{
            background:#334155;
            padding-left:30px;
        }

        .hero{
            background:
            linear-gradient(
            135deg,
            rgba(30,41,59,0.95),
            rgba(17,24,39,0.95));

            padding:60px;
            border-radius:35px;
            margin-bottom:35px;
            box-shadow:0 15px 50px rgba(0,0,0,0.45);
            position:relative;
            overflow:hidden;
        }

        .hero::before{
            content:"";
            position:absolute;
            width:320px;
            height:320px;
            background:#2563eb;
            filter:blur(130px);
            top:-140px;
            right:-120px;
            opacity:0.35;
        }

        .hero h1{
            font-size:65px;
            margin-bottom:15px;
            position:relative;
            z-index:2;
        }

        .hero p{
            color:#94a3b8;
            font-size:20px;
            position:relative;
            z-index:2;
        }

        .stats{
            display:flex;
            gap:25px;
            margin-bottom:35px;
            flex-wrap:wrap;
        }

        .card{
            flex:1;
            min-width:240px;
            background:rgba(30,41,59,0.95);
            padding:35px;
            border-radius:30px;
            backdrop-filter:blur(15px);
            box-shadow:0 10px 35px rgba(0,0,0,0.35);
            transition:0.25s;
        }

        .card:hover{
            transform:translateY(-8px);
        }

        .card h2{
            font-size:50px;
            margin-bottom:10px;
            color:#60a5fa;
        }

        .card p{
            color:#94a3b8;
            font-size:17px;
        }

        .results{
            background:rgba(30,41,59,0.95);
            padding:35px;
            border-radius:35px;
            box-shadow:0 10px 35px rgba(0,0,0,0.35);
            overflow-x:auto;
        }

        .results h2{
            margin-bottom:25px;
            font-size:35px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#334155;
            padding:18px;
            text-align:left;
            color:#dbeafe;
        }

        td{
            padding:18px;
            border-bottom:1px solid rgba(255,255,255,0.05);
            color:#e2e8f0;
        }

        tr{
            transition:0.2s;
        }

        tr:hover{
            background:rgba(255,255,255,0.05);
        }

        .best{
            color:#60a5fa;
            font-weight:700;
            font-size:18px;
        }

        #races{
            letter-spacing:3px;
        }

        @media(max-width:700px){

            body{
                padding:20px;
            }

            .hero{
                padding:35px;
            }

            .hero h1{
                font-size:42px;
            }

            .stats{
                flex-direction:column;
            }

        }

    </style>
</head>

<body>

    <div class="menu-box">

        <button class="menu-button">

            <span class="material-symbols-outlined">
                menu
            </span>

        </button>

        <div class="dropdown">

            <a href="index.html">
                🏁 Wyniki
            </a>

            <a href="historia.html">
                🔥 Historia
            </a>

            <a href="datek.html">
                💙 Wesprzyj
            </a>

        </div>

    </div>

    <div class="container">

        <section class="hero">

            <h1>
                Mateusz Kopaczewski
            </h1>

            <p>
                Statystyki kierowcy • Motorsport • Race Results
            </p>

        </section>

        <section class="stats">

            <div class="card">

                <h2 id="races">
                    2/3
                </h2>

                <p>
                    Zwycięstwa / Sesje treningowe
                </p>

            </div>

            <div class="card">

                <h2 id="bestlapsr5">
                    59.314
                </h2>

                <p>
                    Najlepsze okrążenie SR5
                </p>

            </div>

            <div class="card">

                <h2 id="bestlap">
                    57.014
                </h2>

                <p>
                    Najlepsze okrążenie SR4
                </p>

            </div>

        </section>

        <section class="results">

            <h2>
                Ostatnie wyniki
            </h2>

            <table>

                <thead>

                    <tr>
                        <th>Tor</th>
                        <th>Pozycja</th>
                        <th>Czas</th>
                        <th>Data</th>
                        <th>Model</th>
                        <th>Zawodnicy</th>
                    </tr>

                </thead>

                <tbody id="resultsTable">

                </tbody>

            </table>

        </section>

    </div>

    <script>

        const results = [

            {
                track: "Awix Racing Arena Toruń",
                position: "2",
                liczba_zawodników: "13",
                lap: "59.314",
                date: "09.05.2026",
                model_karta:"SR5"
            },

            {
                track: "Awix Racing Arena Toruń",
                position: "1",
                liczba_zawodników: "5",
                lap: "59.918",
                date: "09.05.2026",
                model_karta:"SR5"
            },

            {
                track: "Awix Racing Arena Toruń",
                position: "1",
                liczba_zawodników: "2",
                lap: "57.014",
                date: "13.05.2026",
                model_karta:"SR4"
            }

        ];

        const table =
        document.getElementById("resultsTable");

        results.forEach(result => {

            table.innerHTML += `

                <tr>

                    <td>${result.track}</td>

                    <td class="best">
                        #${result.position}
                    </td>

                    <td>${result.lap}</td>

                    <td>${result.date}</td>

                    <td>${result.model_karta}</td>

                    <td>${result.liczba_zawodników}</td>

                </tr>

            `;

        });

    </script>

</body>
</html>
