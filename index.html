
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="google-site-verification" content="kUAprVCY8oTKV87CdWIPHE3-_4pBoOX5Z_O4ExaQb2c" />

    <title>Mateusz Kopaczewski - Wyniki</title>
	
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=menu" />


    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            padding: 40px;
			position:relative;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .hero {
            background: linear-gradient(135deg, #1e293b, #111827);
            padding: 50px;
            border-radius: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .hero h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .hero p {
            color: #94a3b8;
            font-size: 18px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 220px;
            background: #1e293b;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .card h2 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .card p {
            color: #94a3b8;
        }

        .results {
            background: #1e293b;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #334155;
            padding: 15px;
            text-align: left;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #334155;
        }

        tr:hover {
            background: rgba(255,255,255,0.05);
        }

        .best {
            color: #3b82f6;
            font-weight: bold;
        }

		.prawy{
			position: absolute;
			top:20px;
			right:20px;
		
		
		}
		
		#races{
			letter-spacing:3px;
		}

        @media(max-width: 700px) {

            body {
                padding: 20px;
            }

            .hero h1 {
                font-size: 35px;
            }

            .stats {
                flex-direction: column;
            }

        }


    </style>
</head>
<body>
	<span class="material-symbols-outlined prawy">
menu
</span>

    <div class="container">

        <section class="hero">
            <h1>Mateusz Kopaczewski</h1>
            <p>Statystyki kierowcy</p>
        </section>

        <section class="stats">

            <div class="card">
                <h2 id="races">2/3</h2>
                <p>Zwycięstwa / Sesje Treningowe</p>
            </div>	

            <div class="card">
                <h2 id="bestlapsr5">59.314</h2>
                <p>Najlepsze okrążenie Sr5</p>
            </div>

            <div class="card">
                <h2 id="bestlap">57.014</h2>
                <p>Najlepsze okrążenie Sr4</p>
            </div>

        </section>

        <section class="results">

            <h2>Ostatnie wyniki</h2>

            <table>

                <thead>
                    <tr>
                        <th>Tor</th>
                        <th>Pozycja</th>
                        <th>Czas</th>
                        <th>Data</th>
                        <th>Model Karta</th>
                        <th>Zawodnicy na torze</th>
                    </tr>
                </thead>

                <tbody id="resultsTable">

                </tbody>

            </table>

        </section>

    </div>

    <script>

        const results = [

            {
                track: "Awix Racing Arena Toruń",
                position: "2",
				liczba_zawodników: "13",
                lap: "59.314",
                date: "09.05.2026",
				model_karta:"Sr5"
            },

            {
                track: "Awix Racing Arena Toruń",
                position: "1",
				liczba_zawodników: "5",
                lap: "59.918",
                date: "09.05.2026",
				model_karta:"Sr5"
            },

            {
                track: "Awix Racing Arena Toruń",
                position: "1",
				liczba_zawodników: "2",
                lap: "57.014",
                date: "13.05.2026",
				model_karta: "Sr4",
            }

        ];

        const table = document.getElementById("resultsTable");

        results.forEach(result => {

            table.innerHTML += `
                <tr>
                    <td>${result.track}</td>
                    <td class="best">#${result.position}</td>
                    <td>${result.lap}</td>
                    <td>${result.date}</td>
                    <td>${result.model_karta}</td>
                    <td>${result.liczba_zawodników}</td>
                </tr>
            `;

        });

    </script>

</body>
</html>
